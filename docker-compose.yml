version: "3.8"

services:
  marktplaats-notifications:
    build:
      context: .
      no_cache: true
    image: mp-scraper:latest
    container_name: marktplaats-notifications
    ports:
      - "7070:7070"
    volumes:
      - mp_data:/app/data
    environment:
      - DB_PATH=/app/data/marktplaats.db
      # Optional: override the Flask secret key
      # - SECRET_KEY=verander-dit-naar-iets-random
    restart: unless-stopped

volumes:
  mp_data:
